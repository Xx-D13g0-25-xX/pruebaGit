<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitalito GLP – Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-wrapper">
      <a class="brand-logo" href="index.html">
        <div class="logo-icon"><i class="material-icons">assignment</i></div>
        Hospitalito GLP
      </a>
    </div>
  </nav>

  <!-- Main -->
  <div class="page-center centered">
    <div class="card-box" style="max-width:400px">

      <div class="avatar-circle sm avatar-indigo">
        <i class="material-icons">login</i>
      </div>

      <h2 class="form-title">Bienvenido</h2>
      <p class="form-subtitle link-indigo">Inicia sesión en tu cuenta</p>

      <!-- Alert area -->
      <div id="alert-box" style="display:none"></div>

      <!-- Role Toggle -->
      <div class="role-toggle">
        <button class="role-btn active" id="btn-usuario" onclick="setRole('usuario')">Usuario</button>
        <button class="role-btn"        id="btn-doctor"  onclick="setRole('doctor')">Doctor</button>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
      </div>

      <!-- Password -->
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
      </div>

      <button class="btn-submit btn-submit-indigo" onclick="doLogin()">Iniciar Sesión</button>

      <p class="footer-link">
        ¿No tienes una cuenta?
        <a class="link-indigo" href="registro.html">Regístrate aquí</a>
      </p>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    let currentRole = 'usuario';

    function setRole(role) {
      currentRole = role;
      document.getElementById('btn-usuario').classList.toggle('active', role === 'usuario');
      document.getElementById('btn-doctor').classList.toggle('active', role === 'doctor');
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      box.className = 'alert alert-' + type;
      box.textContent = msg;
      box.style.display = 'block';
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Por favor completa todos los campos.', 'error');
        return;
      }

      const body = new URLSearchParams({ rol: currentRole, email, password });

      try {
        const res  = await fetch('/hospitalito/login.php', { method: 'POST', body });
        const data = await res.json();

        if (data.ok) {
          window.location.href = data.redirect;
        } else {
          showAlert(data.msg, 'error');
        }
      } catch (e) {
        showAlert('Error de conexión. Verifica que el servidor PHP esté activo.', 'error');
      }
    }

    // Permitir Enter para enviar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
