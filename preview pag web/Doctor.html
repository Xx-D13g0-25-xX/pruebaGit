<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitalito GLP – Inicio Doctor</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <style>
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-btn2: #0e7490;
      --bg: #cffafe;
      --text-main: #1e1b4b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    nav {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      height: 56px; line-height: 56px;
    }
    nav .brand-logo {
      display: flex; align-items: center; gap: 10px;
      padding-left: 20px; color: var(--text-main) !important;
      font-weight: 800; font-size: 1.1rem;
    }
    .logo-icon {
      width: 38px; height: 38px; background: #4f46e5;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon i { color: #fff; font-size: 20px; line-height: 1; }

    .page-center {
      flex: 1; display: flex; align-items: flex-start;
      justify-content: center; padding: 40px 16px;
    }
    .dashboard-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(13,148,136,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 40px 44px 36px;
      width: 100%; max-width: 660px;
      text-align: center;
    }

    .welcome-text {
      font-size: 1.2rem; font-weight: 800;
      color: var(--text-main); margin-bottom: 20px;
    }

    /* Avatar */
    .avatar-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #2dd4bf, #0d9488);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(13,148,136,0.30);
      font-size: 58px; line-height: 1;
    }

    .dashboard-card h4 {
      font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 2px;
    }
    .dashboard-card .last-name {
      font-size: 1rem; color: #666; font-weight: 600; margin-bottom: 28px;
    }

    /* Action buttons row */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .btn-action {
      height: 52px;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.97rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.18s, transform 0.1s;
    }
    .btn-action:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-action:active { transform: translateY(0); }
    .btn-action i { font-size: 20px; }

    .btn-agenda   { background: var(--teal);     box-shadow: 0 4px 14px rgba(13,148,136,0.30); }
    .btn-pacientes { background: var(--teal-btn2); box-shadow: 0 4px 14px rgba(14,116,144,0.30); }

    .btn-logout {
      width: 100%;
      height: 48px;
      background: #f0f0f0;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #555;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.18s;
    }
    .btn-logout:hover { background: #e4e4e4; }
    .btn-logout i { font-size: 20px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-wrapper">
      <a class="brand-logo" href="#">
        <div class="logo-icon"><i class="material-icons">assignment</i></div>
        Hospitalito GLP
      </a>
    </div>
  </nav>

  <div class="page-center">
    <div class="dashboard-card">

      <p class="welcome-text">Bienvenido Doctor</p>

      <div class="avatar-circle">🧑‍⚕️</div>

      <h4>Dr. Carlos</h4>
      <p class="last-name">Rodríguez</p>

      <div class="action-row">
        <button class="btn-action btn-agenda">
          <i class="material-icons">calendar_today</i> Agenda
        </button>
        <button class="btn-action btn-pacientes">
          <i class="material-icons">group</i> Pacientes Asignados
        </button>
      </div>

      <button class="btn-logout">
        <i class="material-icons">logout</i> Cerrar Sesión
      </button>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
