<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitalito GLP</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #818cf8;
      --bg: #e8eaf6;
      --card-bg: #ffffff;
      --text-main: #1e1b4b;
      --text-sub: #4f46e5;
      --border: #e0e0e0;
      --input-focus: #4f46e5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background-color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      height: 56px;
      line-height: 56px;
    }
    nav .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 20px;
      color: var(--text-main) !important;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon i { color: #fff; font-size: 20px; line-height: 1; }

    /* ── Page center ── */
    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Card ── */
    .login-card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(79, 70, 229, 0.10), 0 2px 8px rgba(0,0,0,0.06);
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    /* ── Avatar icon ── */
    .avatar-circle {
      width: 62px;
      height: 62px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
    }
    .avatar-circle i { color: #fff; font-size: 28px; }

    /* ── Headings ── */
    .login-card h4 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .login-card .subtitle {
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 22px;
    }

    /* ── Toggle buttons ── */
    .role-toggle {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 26px;
    }
    .role-btn {
      flex: 1;
      max-width: 130px;
      height: 38px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-family: 'Nunito', sans-serif;
      font-size: 0.93rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      background: #f5f5f5;
      color: #555;
    }
    .role-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 3px 10px rgba(79,70,229,0.3);
    }
    .role-btn:not(.active):hover {
      border-color: var(--primary-light);
      color: var(--primary);
      background: #f0f0ff;
    }

    /* ── Inputs ── */
    .input-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      height: 46px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.93rem;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-group input::placeholder { color: #bbb; }
    .input-group input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      height: 48px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.02em;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(79,70,229,0.3);
    }
    .btn-login:hover {
      background: var(--primary-dark);
      box-shadow: 0 6px 18px rgba(79,70,229,0.38);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }

    /* ── Footer link ── */
    .register-link {
      margin-top: 20px;
      font-size: 0.87rem;
      color: #777;
      font-weight: 600;
    }
    .register-link a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-wrapper">
      <a class="brand-logo" href="#">
        <div class="logo-icon">
          <i class="material-icons">assignment</i>
        </div>
        Hospitalito GLP
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="page-center">
    <div class="login-card">

      <!-- Avatar -->
      <div class="avatar-circle">
        <i class="material-icons">login</i>
      </div>

      <!-- Title -->
      <h4>Bienvenido</h4>
      <p class="subtitle">Inicia sesión en tu cuenta</p>

      <!-- Role Toggle -->
      <div class="role-toggle">
        <button class="role-btn active" id="btn-usuario" onclick="setRole('usuario')">Usuario</button>
        <button class="role-btn" id="btn-doctor" onclick="setRole('doctor')">Doctor</button>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
      </div>

      <!-- Password -->
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
      </div>

      <!-- Submit -->
      <button class="btn-login">Iniciar Sesión</button>

      <!-- Register link -->
      <p class="register-link">
        ¿No tienes una cuenta? <a href="#">Regístrate aquí</a>
      </p>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    function setRole(role) {
      document.getElementById('btn-usuario').classList.toggle('active', role === 'usuario');
      document.getElementById('btn-doctor').classList.toggle('active', role === 'doctor');
    }
  </script>
</body>
</html>
