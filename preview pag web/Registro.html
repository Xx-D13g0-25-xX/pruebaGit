<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitalito GLP – Crear Cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --primary-light: #a78bfa;
      --bg: #f3e8ff;
      --card-bg: #ffffff;
      --text-main: #1e1b4b;
      --text-sub: #7c3aed;
      --border: #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background-color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      height: 56px;
      line-height: 56px;
    }
    nav .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 20px;
      color: var(--text-main) !important;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      background: #4f46e5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon i { color: #fff; font-size: 20px; line-height: 1; }

    /* ── Page center ── */
    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Card ── */
    .register-card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(124, 58, 237, 0.10), 0 2px 8px rgba(0,0,0,0.06);
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    /* ── Avatar icon ── */
    .avatar-circle {
      width: 62px;
      height: 62px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
    }
    .avatar-circle i { color: #fff; font-size: 28px; }

    /* ── Headings ── */
    .register-card h4 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .register-card .subtitle {
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 28px;
    }

    /* ── Grid row ── */
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    /* ── Inputs ── */
    .input-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      height: 46px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.93rem;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-group input::placeholder { color: #bbb; }
    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    /* full-width input group (no bottom margin override) */
    .input-group.full { margin-bottom: 18px; }

    /* ── Submit button ── */
    .btn-register {
      width: 100%;
      height: 48px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.02em;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
    }
    .btn-register:hover {
      background: var(--primary-dark);
      box-shadow: 0 6px 18px rgba(124, 58, 237, 0.42);
      transform: translateY(-1px);
    }
    .btn-register:active { transform: translateY(0); }

    /* ── Footer link ── */
    .login-link {
      margin-top: 20px;
      font-size: 0.87rem;
      color: #777;
      font-weight: 600;
    }
    .login-link a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-wrapper">
      <a class="brand-logo" href="#">
        <div class="logo-icon">
          <i class="material-icons">assignment</i>
        </div>
        Hospitalito GLP
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="page-center">
    <div class="register-card">

      <!-- Avatar -->
      <div class="avatar-circle">
        <i class="material-icons">person_add</i>
      </div>

      <!-- Title -->
      <h4>Crear Cuenta</h4>
      <p class="subtitle">Completa tus datos para registrarte</p>

      <!-- Row 1: Nombre + Apellido Paterno -->
      <div class="input-row">
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="given-name">
        </div>
        <div class="input-group">
          <label for="apellido-paterno">Apellido Paterno</label>
          <input type="text" id="apellido-paterno" placeholder="Apellido paterno" autocomplete="family-name">
        </div>
      </div>

      <!-- Row 2: Apellido Materno + Teléfono -->
      <div class="input-row">
        <div class="input-group">
          <label for="apellido-materno">Apellido Materno</label>
          <input type="text" id="apellido-materno" placeholder="Apellido materno">
        </div>
        <div class="input-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" placeholder="10 dígitos" maxlength="10" autocomplete="tel">
        </div>
      </div>

      <!-- Correo Electrónico -->
      <div class="input-group full">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
      </div>

      <!-- Contraseña -->
      <div class="input-group full">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Crea una contraseña segura" autocomplete="new-password">
      </div>

      <!-- Submit -->
      <button class="btn-register">Registrarse</button>

      <!-- Login link -->
      <p class="login-link">
        ¿Ya tienes una cuenta? <a href="#">Inicia sesión</a>
      </p>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
