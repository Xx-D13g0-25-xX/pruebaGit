<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitalito GLP – Crear Cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: var(--bg-register); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-wrapper">
      <a class="brand-logo" href="index.html">
        <div class="logo-icon"><i class="material-icons">assignment</i></div>
        Hospitalito GLP
      </a>
    </div>
  </nav>

  <!-- Main -->
  <div class="page-center centered focus-purple">
    <div class="card-box" style="max-width:600px">

      <div class="avatar-circle sm avatar-purple">
        <i class="material-icons">person_add</i>
      </div>

      <h2 class="form-title">Crear Cuenta</h2>
      <p class="form-subtitle link-purple">Completa tus datos para registrarte</p>

      <!-- Alert area -->
      <div id="alert-box" style="display:none"></div>

      <!-- Row 1 -->
      <div class="input-row">
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="given-name">
        </div>
        <div class="input-group">
          <label for="apellido-paterno">Apellido Paterno</label>
          <input type="text" id="apellido-paterno" placeholder="Apellido paterno" autocomplete="family-name">
        </div>
      </div>

      <!-- Row 2 -->
      <div class="input-row">
        <div class="input-group">
          <label for="apellido-materno">Apellido Materno</label>
          <input type="text" id="apellido-materno" placeholder="Apellido materno">
        </div>
        <div class="input-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" placeholder="10 dígitos" maxlength="10" autocomplete="tel">
        </div>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
      </div>

      <!-- Password -->
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>

      <button class="btn-submit btn-submit-purple" onclick="doRegistro()">Registrarse</button>

      <p class="footer-link">
        ¿Ya tienes una cuenta?
        <a class="link-purple" href="index.html">Inicia sesión</a>
      </p>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      box.className = 'alert alert-' + type;
      box.textContent = msg;
      box.style.display = 'block';
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function doRegistro() {
      const nombre   = document.getElementById('nombre').value.trim();
      const ap_pat   = document.getElementById('apellido-paterno').value.trim();
      const ap_mat   = document.getElementById('apellido-materno').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!nombre || !ap_pat || !telefono || !email || !password) {
        showAlert('Por favor completa todos los campos obligatorios.', 'error');
        return;
      }

      const body = new URLSearchParams({
        nombre, apellido_paterno: ap_pat, apellido_materno: ap_mat,
        telefono, email, password
      });

      try {
        const res  = await fetch('/hospitalito/registro.php', { method: 'POST', body });
        const data = await res.json();

        if (data.ok) {
          showAlert(data.msg, 'success');
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          showAlert(data.msg, 'error');
        }
      } catch (e) {
        showAlert('Error de conexión. Verifica que el servidor PHP esté activo.', 'error');
      }
    }
  </script>
</body>
</html>
